name: Dependabot auto-merge

# 只对 Dependabot 开的 PR 生效
# patch + minor 升级在 CI 通过后自动 squash-merge
# major 升级需人工 review (依赖 dependabot.yaml 的 ignore: version-update:semver-major)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

# 避免和 PR 主体并发打架: 任何时刻只跑 1 个
concurrency:
  group: dependabot-auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor
        if: |
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major (留待人工 review)
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body '⚠️ Major 版本升级不会自动合并, 请人工 review breaking change 后再 squash-merge.'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
